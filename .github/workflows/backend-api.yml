name: Build Backend Image

on:
  push:
    paths:
      - "backend/api/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t ghcr.io/${{ github.actor }}/netflop-api:latest ./backend/api

      - name: Push image
        run: docker push ghcr.io/${{ github.actor }}/netflop-api:latest