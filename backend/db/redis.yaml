apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-db-dbeployment
  labels:
    netflop: db
spec:
  replicas: 1
  selector:
    matchLabels:
      netflop: db
  template:
    metadata:
      labels:
        netflop: db
    spec:
      containers:
      - name: redis-db
        image: redis:7
        ports:
        - containerPort: 6379

---

apiVersion: v1
kind: Service
metadata:
  name: redis-db-service
  labels:
    netflop: db
spec:
  type: ClusterIP
  selector:
    netflop: db
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379